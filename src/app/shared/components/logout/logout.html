<div class="flex flex-col items-center gap-5 px-8 py-8 w-80">
  <!-- icon -->
  <div
    class="w-16 h-16 rounded-full bg-red-50 flex items-center justify-center ring-8 ring-red-50/50"
  >
    <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
      />
    </svg>
  </div>

  <!-- text -->
  <div class="text-center">
    <h3 class="text-base font-bold text-gray-900">Ready to leave?</h3>
    <p class="text-xs text-gray-400 mt-1.5 leading-relaxed">
      You will be logged out of your account.<br />You can always log back in.
    </p>
  </div>

  <!-- buttons -->
  <div class="flex gap-3 w-full pt-1">
    <button
      (click)="close(false)"
      class="flex-1 py-3 text-sm font-semibold text-gray-500 bg-gray-100 hover:bg-gray-200 rounded-2xl transition-all duration-200 cursor-pointer"
    >
      Cancel
    </button>
    <button
      (click)="close(true)"
      class="flex-1 py-3 text-sm font-semibold text-white rounded-2xl transition-all duration-200 cursor-pointer bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 shadow-lg shadow-red-200"
    >
      Logout
    </button>
  </div>
</div>
