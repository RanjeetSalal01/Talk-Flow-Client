<div class="relative" [ngClass]="{ 'w-full h-full': bigInitial }">
  <div
    [ngClass]="{'w-full h-full text-lg': bigInitial, 'w-10 h-10 text-xs': !bigInitial}"
    class="rounded-full gradient-button flex items-center justify-center text-white font-bold shrink-0"
  >
    {{ getInitials(name) }}
  </div>
  <div
    *ngIf="isOnline"
    class="absolute bottom-0 right-0 w-3 h-3 bg-success rounded-full border-2 border-card"
  ></div>
</div>
