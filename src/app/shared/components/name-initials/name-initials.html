<div class="relative" [ngClass]="{ 'w-full h-full': isCallModalOpened }">
  <div
    [ngClass]="{'w-full h-full': isCallModalOpened, 'w-10 h-10': !isCallModalOpened}"
    class="rounded-full gradient-button flex items-center justify-center text-white text-sm font-bold shrink-0"
  >
    {{ getInitials(name) }}
  </div>
  <div
    *ngIf="isOnline"
    class="absolute bottom-0 right-0 w-3 h-3 bg-success rounded-full border-2 border-card"
  ></div>
</div>
