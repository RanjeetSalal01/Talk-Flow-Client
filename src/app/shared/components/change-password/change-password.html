<div class="flex flex-col gap-4 p-4 md:p-6 w-full md:w-[500px]">
  <div>
    <h3 class="text-sm font-bold text-gray-900">Change Password</h3>
    <p class="text-xs text-gray-400 mt-0.5">Enter your current and new password</p>
  </div>

  <div class="w-full h-px bg-gray-100"></div>

  <form [formGroup]="form" class="flex flex-col gap-3">
    <!-- current password -->
    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-gray-600">Current Password</label>
      <div class="relative">
        <input
          formControlName="currentPassword"
          [type]="showCurrent ? 'text' : 'password'"
          placeholder="Enter current password"
          class="w-full pr-9 pl-4 py-3 text-xs border border-gray-300 rounded-lg focus:outline-offset-[5px] focus:outline-primary focus:ring-2 focus:ring-primary focus:border-transparent"
        />
        <div
          (click)="showCurrent = !showCurrent"
          class="absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer"
        >
          <svg
            *ngIf="!showCurrent"
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
            />
          </svg>
          <svg
            *ngIf="showCurrent"
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21"
            />
          </svg>
        </div>
      </div>
      <p
        *ngIf="
          isSubmitted() && form.get('currentPassword')?.errors?.['required']
        "
        class="text-[10px] text-red-500"
      >
        Required
      </p>
    </div>

    <!-- new password -->
    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-gray-600">New Password</label>
      <div class="relative">
        <input
          formControlName="newPassword"
          [type]="showNew ? 'text' : 'password'"
          placeholder="Enter new password"
          class="w-full pr-9 pl-4 py-3 text-xs border border-gray-300 rounded-lg focus:outline-offset-[5px] focus:outline-primary focus:ring-2 focus:ring-primary focus:border-transparent"
        />
        <div
          (click)="showNew = !showNew"
          class="absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer"
        >
          <svg
            *ngIf="!showNew"
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
            />
          </svg>
          <svg
            *ngIf="showNew"
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21"
            />
          </svg>
        </div>
      </div>

      <p
        class="error"
        *ngIf="isSubmitted() && form.get('newPassword')?.errors?.['pattern']"
      >
        8 characters, uppercase, lowercase, number and a special character.
      </p>
    </div>

    <!-- confirm password -->
    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-gray-600">Confirm Password</label>
      <div class="relative">
        <input
          formControlName="confirmPassword"
          [type]="showConfirm ? 'text' : 'password'"
          placeholder="Confirm new password"
          class="w-full pr-9 pl-4 py-3 text-xs border border-gray-300 rounded-lg focus:outline-offset-[5px] focus:outline-primary focus:ring-2 focus:ring-primary focus:border-transparent"
        />
        <div
          (click)="showConfirm = !showConfirm"
          class="absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer"
        >
          <svg
            *ngIf="!showConfirm"
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
            />
          </svg>
          <svg
            *ngIf="showConfirm"
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21"
            />
          </svg>
        </div>
      </div>
      <p
        *ngIf="form.get('confirmPassword')?.dirty && form.errors?.['mismatch']"
        class="text-[10px] text-red-500"
      >
        Passwords do not match
      </p>
    </div>
  </form>

  <div class="flex gap-3 w-full pt-1">
    <button
      (click)="close()"
      class="flex-1 py-2.5 text-xs font-semibold text-gray-500 bg-gray-100 hover:bg-gray-200 rounded-xl transition cursor-pointer"
    >
      Cancel
    </button>
    <button
      (click)="submit()"
      class="flex-1 py-2.5 text-xs font-semibold text-white rounded-xl transition cursor-pointer gradient-button hover:opacity-90 disabled:opacity-50"
    >
      {{ saving() ? 'Saving...' : 'Update' }}
    </button>
  </div>
</div>
