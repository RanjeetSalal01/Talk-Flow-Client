<div class="min-h-screen bg-background h-screen overflow-y-auto" (scroll)="onScroll($event)">
  <div class="w-full px-6 py-6">
    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-xl font-bold text-foreground">Call History</h1>
      <p class="text-xs text-muted-foreground mt-1">View your recent calls</p>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="flex flex-col gap-y-4">
      <div *ngFor="let i of [1, 2, 3]" class="h-16 bg-muted rounded-lg animate-pulse"></div>
    </div>

    <!-- Empty -->
    <div
      *ngIf="!loading && calls.length === 0"
      class="flex flex-col items-center justify-center py-20 text-muted-foreground"
    >
      <lucide-icon name="phone-off" size="40" class="mb-3 opacity-30"></lucide-icon>
      <p class="text-sm">No call history yet</p>
    </div>

    <!-- Call List -->
    <div *ngIf="!loading" class="flex flex-col gap-y-4">
      <div
        *ngFor="let call of calls; trackBy: trackById"
        class="flex items-center justify-between p-4 bg-card hover:shadow-md duration-200 border rounded-lg transition"
      >
        <div class="flex items-center gap-4">
          <!-- Avatar -->
          <img
            *ngIf="getRemoteUser(call).avatarUrl"
            [src]="getRemoteUser(call).avatarUrl"
            class="w-8 h-8 rounded-full object-cover"
          />
          <app-name-initials
            *ngIf="!getRemoteUser(call).avatarUrl"
            [name]="getRemoteUser(call).fullName"
          ></app-name-initials>

          <!-- Call Info -->
          <div>
            <div class="flex items-center gap-2">
              <span
                class="font-semibold text-xs"
                [class]="
                  call.status === 'missed' || call.status === 'rejected'
                    ? 'text-red-600'
                    : 'text-gray-900'
                "
                >{{ getRemoteUser(call).fullName }}</span
              >
              <lucide-icon
                *ngIf="call.callType === 'video'"
                name="video"
                size="16"
                class="text-gray-400"
              ></lucide-icon>
            </div>
            <div class="flex items-center gap-2 text-[10px] text-gray-500 mt-0.5">
              <lucide-icon
                [name]="getCallIcon(call).icon"
                size="14"
                [class]="getCallIcon(call).color"
              ></lucide-icon>
              <span>{{ call.createdAt | date: 'MMM d, h:mm a' }}</span>
              <ng-container *ngIf="call.duration">
                <span>•</span>
                <lucide-icon name="clock" size="14"></lucide-icon>
                <span>{{ formatDuration(call.duration) }}</span>
              </ng-container>
              <ng-container *ngIf="!call.duration">
                <span>•</span>
                <span class="capitalize">{{ call.status }}</span>
              </ng-container>
            </div>
          </div>
        </div>

        <!-- Action Button -->
        <button (click)="callBack(call)" class="p-2 hover:bg-gray-100 rounded-lg transition">
          <lucide-icon
            [name]="call.callType === 'video' ? 'video' : 'phone'"
            size="16"
            class="text-gray-600 cursor-pointer"
          ></lucide-icon>
        </button>
      </div>

      <!-- ✅ load more spinner -->
      <div *ngIf="loadingMore" class="flex justify-center py-4">
        <div
          class="w-5 h-5 border-2 border-primary border-t-transparent rounded-full animate-spin"
        ></div>
      </div>

      <!-- ✅ end of list -->
      <div
        *ngIf="!hasMore && calls.length > 0"
        class="text-center text-[10px] text-muted-foreground py-4"
      >
        No more calls to load
      </div>
    </div>
  </div>
</div>
