<div class="h-screen overflow-auto bg-background">
  <div class="bg-card px-6 py-6 max-w-3xl mx-auto">
    <h1 class="text-xl font-bold text-foreground">Profile</h1>
    <p class="text-xs text-muted-foreground mt-1">Manage your public profile</p>
  </div>

  <div class="max-w-3xl mx-auto px-6 pb-12">
    <div class="bg-card border border-border rounded-xl p-8">
      <div class="flex flex-col items-center">
        <!-- Avatar -->
        <div
          class="w-28 h-28 rounded-full ring-4 ring-primary/10 flex items-center justify-center mb-3 relative"
          [class.cursor-pointer]="isEditing"
          (click)="onAvatarClick()"
        >
          <!-- preview while editing -->
          <img
            *ngIf="avatarPreview"
            [src]="avatarPreview"
            class="w-24 h-24 rounded-full object-cover"
          />

          <!-- existing avatar -->
          <img
            *ngIf="!avatarPreview && auth.user()?.avatarUrl"
            [src]="auth.user()?.avatarUrl"
            class="w-24 h-24 rounded-full object-cover"
          />

          <!-- no avatar → name initials -->
          <app-name-initials
            [bigInitial]="true"
            *ngIf="!avatarPreview && !auth.user()?.avatarUrl"
            [name]="auth.user()?.fullName"
            class="w-24 h-24 text-2xl"
          ></app-name-initials>
        </div>

        <label for="avatarInput" class="text-xs cursor-pointer text-muted-foreground mb-6"
          >Click to change photo</label
        >
        <input
          id="avatarInput"
          type="file"
          accept="image/*"
          class="hidden"
          (change)="onFileSelected($event)"
        />

        <div class="w-full space-y-5" [formGroup]="form">
          <!-- Username -->
          <div>
            <label class="text-xs text-muted-foreground block mb-2">Username</label>
            <div class="bg-secondary rounded-lg px-4 py-3 text-sm text-foreground">
              @ {{ auth.user()?.username }}
            </div>
          </div>

          <!-- Display Name -->
          <div>
            <label class="text-xs text-muted-foreground block mb-2">Display Name</label>
            <input
              formControlName="fullName"
              class="w-full rounded-lg border border-border bg-secondary px-4 py-3 text-sm text-foreground outline-none focus:ring-2 focus:ring-primary/20"
            />
          </div>

          <!-- Bio -->
          <div>
            <label class="text-xs text-muted-foreground block mb-2">Bio</label>
            <!-- show text when not editing -->
            <div
              *ngIf="!isEditing"
              class="bg-secondary rounded-lg px-4 py-3 text-sm text-foreground"
            >
              {{ auth.user()?.bio || '-' }}
            </div>
            <!-- textarea when editing -->
            <textarea
              *ngIf="isEditing"
              formControlName="bio"
              class="w-full rounded-lg border border-border bg-secondary px-4 py-3 text-sm text-foreground outline-none focus:ring-2 focus:ring-primary/20"
              rows="3"
            ></textarea>
          </div>

          <!-- Actions -->
          <div class="flex justify-end gap-3">
            <button
              *ngIf="isEditing"
              (click)="cancel()"
              class="text-xs px-5 py-3 cursor-pointer rounded-lg border border-border text-muted-foreground hover:bg-muted transition"
            >
              Cancel
            </button>
            <button
              *ngIf="!isEditing"
              (click)="edit()"
              class="gradient-button text-xs flex items-center gap-2 px-5 py-3 cursor-pointer rounded-lg text-white"
            >
              <lucide-icon name="edit" size="16" class="text-white"></lucide-icon>
              Edit Profile
            </button>
            <button
              *ngIf="isEditing"
              (click)="save()"
              [disabled]="saving"
              class="gradient-button text-xs flex items-center gap-2 px-5 py-3 cursor-pointer rounded-lg text-white disabled:opacity-60"
            >
              <lucide-icon
                [name]="saving ? 'loader' : 'save'"
                size="16"
                class="text-white"
                [class.animate-spin]="saving"
              ></lucide-icon>
              {{ saving ? 'Saving...' : 'Save' }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
