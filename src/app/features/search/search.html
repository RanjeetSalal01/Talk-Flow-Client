<div class="min-h-screen bg-background">
  <!-- Header -->
  <div class="bg-card px-6 py-6">
    <h1 class="text-xl font-bold text-foreground">Find People</h1>
    <p class="text-xs text-muted-foreground mt-1">Search and connect with new friends</p>
  </div>

  <div class="w-full px-6 pb-8 pt-2">
    <!-- Search box -->
    <div class="mb-6">
      <div class="relative">
        <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
          <lucide-icon name="search" size="16" class="text-muted-foreground"></lucide-icon>
        </div>
        <input
          type="text"
          placeholder="Search by username or bio..."
          [formControl]="searchControl"
          class="w-full pl-10 pr-2 text-xs py-3 border bg-secondary border-gray-300 rounded-lg focus:outline-offset-[5px] focus:outline-primary focus:ring-2 focus:ring-primary focus:border-transparent"
        />
      </div>
    </div>

    <!-- Results -->
    <div class="space-y-4">
      <!-- Item 1 -->

      <!-- skeleton -->
      <ng-container *ngIf="loading">
        <div
          *ngFor="let i of [1, 2, 3]"
          class="bg-card border border-border rounded-lg p-4 flex items-center justify-between animate-pulse"
        >
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-muted"></div>
            <div class="space-y-2">
              <div class="h-3 w-24 bg-muted rounded"></div>
              <div class="h-2 w-40 bg-muted rounded"></div>
            </div>
          </div>
          <div class="h-8 w-20 bg-muted rounded-lg"></div>
        </div>
      </ng-container>

      <ng-container *ngIf="!loading">
        <ng-container *ngIf="users.length > 0">
          <div
            *ngFor="let user of users; trackBy: trackByUser"
            class="bg-card border border-border rounded-lg p-4 flex items-center justify-between"
          >
            <div class="flex items-center gap-4">
              <img
                src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=400&fit=crop"
                alt="alice"
                class="w-12 h-12 rounded-full object-cover border-2 border-border"
              />
              <div>
                <div class="font-semibold text-foreground text-xs">{{ user.username }}</div>
                <div class="text-[10px] text-muted-foreground">
                  {{ user.bio }}
                </div>
              </div>
            </div>
            <button
              type="button"
              (click)="sendRequest(user)"
              [ngClass]="{
                'gradient-button text-white': user.status === 'none',
                'border border-warning text-warning': user.status === 'pending',
                'bg-success/10 text-success': user.status === 'friends',
              }"
              class="cursor-pointer flex items-center gap-2 px-4 py-2 rounded-lg text-xs"
            >
              <lucide-icon
                *ngIf="user.status == 'none'"
                name="message-square-plus"
                size="16"
                class="text-white"
              ></lucide-icon>
              <lucide-icon
                *ngIf="user.status == 'pending'"
                name="clock"
                size="16"
                class="text-warning"
              ></lucide-icon>
              <lucide-icon
                *ngIf="user.status == 'friends'"
                name="check"
                size="16"
                class="text-success"
              ></lucide-icon>
              {{user.status == 'friends' ? 'Friends' : user.status == 'pending' ? 'Pending' : 'Request'}}
            </button>
          </div></ng-container
        >
        <div
          class="flex flex-col gap-y-4 justify-center mt-16 items-center"
          *ngIf="users.length === 0"
        >
          <div class="w-12 h-12 rounded-full bg-muted/50 flex items-center justify-center">
            <lucide-icon name="search" size="20" class="text-muted-foreground"></lucide-icon>
          </div>
          <div class="text-center space-y-2 flex flex-col items-center justify-center">
            <p class="font-medium text-foreground/70 text-sm">Search for people</p>
            <p class="text-sm text-muted-foreground max-w-60 text-xs">
              Type a username above to find and connect with new friends
            </p>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
</div>
